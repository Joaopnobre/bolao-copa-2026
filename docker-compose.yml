version: "3.9"

services:
  postgres:
    image: postgres:16-alpine
    container_name: bolao_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: bolao
      POSTGRES_PASSWORD: bolao2026
      POSTGRES_DB: bolao_copa2026
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U bolao -d bolao_copa2026"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
